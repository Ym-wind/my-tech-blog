baseURL: "https://Ym-wind.github.io/my-tech-blog/" 
# 请把 yourname 换成你真实的 GitHub 用户名
title: "ym的博客"
theme: "hugo-theme-stack"
languageCode: "zh-cn"
hasCJKLanguage: true # 开启中文支持，优化字数统计

params:
  # 侧边栏配置
  # 加入下面这两行，强制首页抓取 posts 文件夹！
  article:
    math: true

  mainSections:
    - posts
  sidebar:
    emoji: 🍥
    subtitle: "探索脉冲神经网络的废物大学生"
    avatar: "img/avatar.jpg" # 你的头像
      
  # 背景图配置
  background:
    color: "#f4f4f4"
    image: "img/background.jpg" # 你的背景图

  params:
  # 开启评论区功能
  comments:
    enabled: true
    provider: giscus
    giscus:
      repo: Ym-wind/my-tech-blog
      repoId: "R_kgDOR0gNBA"      # 例如 "R_kgDOM..."
      category: General                      # 对应你刚才在网页上选的分类
      categoryId: "DIC_kwDOR0gNBM4C5mdY"  # 例如 "DIC_kwDOM..."
      mapping: pathname
      reactionsEnabled: 1
      emitMetadata: 0
      lightTheme: light
      darkTheme: transparent_dark  # 完美适配Stack主题的暗黑模式

menu:
  main:
    - identifier: about
      name: 关于我 # 左侧菜单显示的文字
      url: /about/
      weight: 1 # 数字越小，排在越上面

